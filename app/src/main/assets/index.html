<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>小人国奇遇记</title>
    <meta name="application-name" content="小人国奇遇记" />
    <meta name="theme-color" content="#ff69b4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
    />
    <link rel="manifest" href="./public/manifest.json" />
    <link rel="icon" href="./public/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./public/pwa-icon.svg" />
    <link rel="stylesheet" href="./public/all.min.css" />
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 参考风格：渐变背景 + 半透明卡片 */
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }
        body {
            height: 100vh;
            background: linear-gradient(
                135deg,
                #fff9e6 0%,
                #e8f4fd 25%,
                #fff5f8 50%,
                #f0f8ff 75%,
                #fff0e6 100%
            );
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            touch-action: pan-y;
            position: relative;
        }

        /* 背景装饰层 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="3" fill="%23FFD700" opacity="0.3"/><circle cx="80" cy="30" r="2" fill="%23FF69B4" opacity="0.3"/><circle cx="50" cy="60" r="4" fill="%2387CEEB" opacity="0.2"/><circle cx="90" cy="80" r="2" fill="%23FFD700" opacity="0.3"/><circle cx="10" cy="70" r="3" fill="%23FFB6C1" opacity="0.3"/><polygon points="30,10 33,16 40,16 35,20 37,27 30,23 23,27 25,20 20,16 27,16" fill="%23FFD700" opacity="0.2"/><polygon points="70,50 72,54 77,54 73,57 75,62 70,59 65,62 67,57 63,54 68,54" fill="%23FF69B4" opacity="0.2"/></svg>');
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        /* 顶部标题栏 - 白色半透明卡片 */
        .header {
            background: rgba(255, 255, 255, 0.92);
            color: #ff69b4;
            padding: 8px 20px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.15);
            border-radius: 0 0 24px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
            border: 2px solid rgba(255, 182, 193, 0.5);
            border-top: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            flex-shrink: 0;
            min-height: 52px;
            height: auto;
            flex-wrap: wrap;
            box-sizing: border-box;
        }

        .header-buttons {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin: -3px;
        }
        .header-buttons > * {
            margin: 3px;
        }

        .header-buttons-inline {
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            vertical-align: middle;
            margin: -3px;
        }
        .header-buttons-inline > * {
            margin: 3px;
        }

        .header-buttons-inline {
            margin-left: 0;
        }

        /* 头部按钮 - 彩色渐变风格 */
        .header-btn {
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
        .header-btn:hover {
            transform: translateY(-2px);
        }
        .header-btn:active {
            transform: translateY(0);
        }
        .header-btn i {
            font-size: 16px;
            color: white;
        }

        #bgSelectorBtn {
            background: linear-gradient(
                145deg,
                #e8d5f5 0%,
                #d4a5e8 50%,
                #c993d9 100%
            );
            border-radius: 50%;
            width: 44px;
            height: 44px;
        }
        #bgSelectorBtn i {
            font-size: 16px;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        #saveBtnHeader,
        #deleteBtn,
        #clearBtn {
            background: linear-gradient(145deg, #74b9ff 0%, #0984e3 100%);
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
        }
        #recordBtnHeader {
            background: linear-gradient(145deg, #a29bfe 0%, #6c5ce7 100%);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.35);
        }
        #recordBtnHeader.recording {
            background: linear-gradient(145deg, #ff7675 0%, #d63031 100%);
            box-shadow: 0 0 0 3px rgba(214, 48, 49, 0.35);
            animation: recordPulse 1.2s ease-in-out infinite;
        }
        @keyframes recordPulse {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(0) scale(1.05);
            }
        }
        #eraserBtn {
            background: linear-gradient(145deg, #a8d8ff 0%, #74b9ff 100%);
        }
        #lockBtn {
            background: linear-gradient(145deg, #ffeaa7 0%, #fdcb6e 100%);
        }
        #deleteBtn {
            background: linear-gradient(145deg, #a8e6cf 0%, #55efc4 100%);
        }
        #clearBtn {
            background: linear-gradient(145deg, #ffb8b8 0%, #ff7675 100%);
        }
        #eraserBtn i,
        #lockBtn i,
        #deleteBtn i,
        #clearBtn i,
        #undoBtn i {
            color: white;
            outline: none;
            box-shadow: none;
        }
        #videoBtnHeader {
            background: linear-gradient(145deg, #ff7675 0%, #d63031 100%);
        }
        #videoBtnHeader {
            background: linear-gradient(145deg, #ff7675 0%, #d63031 100%);
        }

        /* 背景选择器悬浮框 */
        .bg-dropdown {
            position: relative;
        }
        .bg-option:hover {
            background: linear-gradient(135deg, #fff5f8 0%, #ffe4ee 100%);
            transform: translateX(4px);
        }
        .bg-option.selected {
            background: linear-gradient(135deg, #ffd4e5 0%, #ffb6c1 100%);
            color: #ff69b4;
        }
        .bg-color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
        }
        .bg-image-swatch {
            width: 40px;
            height: 28px;
            border-radius: 6px;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
            background-size: cover;
            background-position: center;
        }

        /* 中间区域 - 物品栏 + 画布 */
        .middle-area {
            flex: 1;
            display: flex;
            padding: 12px;
            min-height: 0;
            position: relative;
            z-index: 1;
        }
        .middle-area > * + * {
            margin-left: 12px;
        }

        /* 左侧物品栏 - 白色半透明卡片风格 */
        .toolbar-left {
            width: 140px;
            min-width: 140px;
            max-width: 140px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.2);
            display: flex;
            flex-direction: column;
            padding: 15px 10px;
            border-radius: 24px;
            border: 2px solid rgba(255, 182, 193, 0.5);
            z-index: 10;
            overflow-y: auto;
            flex-shrink: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .toolbar-left > * + * {
            margin-top: 10px;
        }
        .toolbar-left::-webkit-scrollbar {
            display: none;
        }

        .material-panel {
            display: flex;
            flex-direction: column;
        }
        .material-panel > * + * {
            margin-top: 8px;
        }
        .category {
            display: flex;
            flex-direction: column;
        }
        .category > * + * {
            margin-top: 6px;
        }

        /* 分类标题 */
        .category-title {
            font-size: 11px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #fff5f8 100%);
            padding: 6px 8px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #ffd4e5;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.12);
            color: #ff69b4;
        }
        .category-title > * + * {
            margin-left: 4px;
        }
        .category-title:hover {
            background: linear-gradient(135deg, #ffd4e5 0%, #ffe4ee 100%);
            transform: translateY(-1px);
        }
        .category-title.collapsed {
            background: linear-gradient(135deg, #ffd4e5 0%, #ffe4ee 100%);
        }
        .category-title i {
            font-size: 12px;
        }

        /* 物品分类标题 */
        .category-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            padding: 8px 10px;
            background: linear-gradient(135deg, #ffe4ec 0%, #fff0f5 100%);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            -webkit-user-select: none;
        }

        .category-title:hover {
            background: linear-gradient(135deg, #ffd6e4 0%, #ffe8f0 100%);
        }

        .category-title i:first-child {
            margin-right: 8px;
        }

        .collapse-icon {
            font-size: 12px;
            transition: transform 0.3s ease;
            color: #e91e63;
        }

        .category-title.expanded .collapse-icon {
            transform: rotate(180deg);
        }

        /* 物品按钮 */
        .category-items {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            justify-items: center;
            padding: 5px 0;
        }
        .category-items.show {
            display: grid;
        }

        .mat-btn {
            background: linear-gradient(145deg, #ffffff 0%, #fff8fa 100%);
            border: 2px solid rgba(255, 182, 193, 0.5);
            border-radius: 14px;
            padding: 3px;
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 56px;
            height: 56px;
            transition: all 0.2s;
        }
        .mat-btn img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 10px;
        }
        .mat-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 16px rgba(255, 105, 180, 0.2);
            border-color: #ff69b4;
        }

        /* 变体选择面板 */
        .variants-panel {
            position: fixed;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.25);
            padding: 12px;
            z-index: 1000;
            min-width: 200px;
            animation: fadeIn 0.2s ease;
        }

        .variants-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 105, 180, 0.2);
        }

        .variants-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .variant-btn {
            width: 60px;
            height: 60px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: #f8f8f8;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.2s ease;
            padding: 4px;
        }

        .variant-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .variant-btn:hover {
            transform: scale(1.1);
            border-color: #ff69b4;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .mat-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* 画布区域 */
        .scene-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            overflow: visible;
        }
        #scene {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.15),
                inset 0 0 0 3px rgba(255, 182, 193, 0.3);
            border: 3px solid rgba(255, 182, 193, 0.5);
            overflow: hidden;
            touch-action: none;
            cursor: none;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        #bgCanvas,
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #bgCanvas {
            z-index: 1;
            pointer-events: none;
        }
        #itemsLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }
        #drawCanvas {
            z-index: 4;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 可拖拽物品 */
        .draggable {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
            background: transparent;
            border: none;
            transform-origin: center;
            filter: drop-shadow(0 4px 8px rgba(255, 105, 180, 0.2));
            pointer-events: auto;
            z-index: 5;
            touch-action: none;
            will-change: transform; /* 提升触摸性能 */
        }
        .draggable img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
        }
        /* 儿童：尺寸由 JS 按原图比例设定；避免强 filter / 对比度算法导致发糊 */
        .draggable[data-type='kid'] {
            z-index: 10000;
            box-sizing: border-box;
            filter: drop-shadow(0 2px 8px rgba(255, 105, 180, 0.2));
        }
        .draggable[data-type='kid'] img {
            image-rendering: auto;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .draggable.selected {
            outline: 3px solid #ff69b4;
            outline-offset: 4px;
            z-index: 20 !important;
        }
        .draggable[data-type='kid'].selected {
            z-index: 10001 !important;
        }
        .img-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            margin: -12px 0 0 -12px;
            border: 3px solid rgba(255, 182, 193, 0.3);
            border-top-color: #ff69b4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            pointer-events: none;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 自定义光标 */
        #customCursor {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            display: none;
            width: 12px;
            height: 12px;
            background: linear-gradient(145deg, #ff69b4 0%, #ff1493 100%);
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 10px rgba(255, 20, 147, 0.4);
            transform: translate(10px, -30px);
        }
        #customCursor.eraser-mode {
            width: 24px;
            height: 24px;
            background: linear-gradient(145deg, #fff 0%, #fff5f8 100%);
            border: 3px solid #ffb6c1;
            border-radius: 6px;
        }

        /* 底部工具栏 - 毛玻璃卡片 */
        .bottom-toolbar {
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 -8px 32px rgba(255, 105, 180, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border-top: 2px solid rgba(255, 182, 193, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            flex-wrap: wrap;
            height: 60px;
            box-sizing: border-box;
            margin: -6px;
        }
        .bottom-toolbar > * {
            margin: 6px;
        }

        /* 工具按钮 - 清晰图标 */
        .tool-btn {
            background: linear-gradient(145deg, #ffffff 0%, #fff8fa 100%);
            border: none;
            border-radius: 50%;
            padding: 0;
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 44px;
            height: 44px;
            transition: all 0.2s;
            color: #ff69b4;
            font-size: 14px;
        }
        .tool-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.25);
            border-color: #ff69b4;
        }
        .tool-btn:active {
            transform: translateY(0);
        }
        .tool-btn.active {
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
            border-color: #ff69b4;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
            color: white;
        }
        .tool-btn.warning {
            background: linear-gradient(145deg, #ffe4ec 0%, #ffd4e5 100%);
            border-color: rgba(255, 182, 193, 0.7);
        }
        .tool-btn i {
            font-size: 22px;
        }
        .tool-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        .tool-btn.disabled:hover {
            transform: none;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.15);
        }

        /* 粗细选择器 */
        .size-selector {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(255, 105, 180, 0.1);
            border: 2px solid rgba(255, 182, 193, 0.4);
        }
        .size-selector > * + * {
            margin-left: 4px;
        }
        .size-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(145deg, #fff 0%, #fff5f8 100%);
            border: 2px solid rgba(255, 182, 193, 0.5);
            box-shadow: 0 2px 6px rgba(255, 105, 180, 0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .size-btn:hover {
            transform: scale(1.1);
        }
        .size-btn.active {
            background: linear-gradient(145deg, #ffb6c1 0%, #ff69b4 100%);
            border-color: #ff69b4;
            box-shadow: 0 3px 10px rgba(255, 105, 180, 0.4);
        }
        .size-dot {
            background: #e91e63;
            border-radius: 50%;
        }

        /* 画笔下拉菜单 */
        .brush-dropdown {
            position: relative;
        }
        .brush-dropdown .dropdown-arrow {
            font-size: 8px;
            margin-left: 2px;
        }
        .brush-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            min-width: 200px;
        }
        .brush-dropdown-content.show,
        .brush-dropdown-content.show {
            display: block;
        }
        .bg-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            min-width: 200px;
        }
        .bg-dropdown:hover .bg-dropdown-content,
        .bg-dropdown-content.show {
            display: block;
        }
        .bg-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            min-width: 200px;
        }
        .bg-option {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px;
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .bg-option:hover {
            transform: scale(1.05);
            border-color: #0984e3;
        }
        .bg-option.selected {
            border-color: #0984e3;
            box-shadow: 0 0 0 2px rgba(9, 132, 227, 0.3);
        }
        .dropdown-section {
            margin-bottom: 12px;
        }
        .dropdown-section:last-child {
            margin-bottom: 0;
        }
        .dropdown-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .color-swatch:hover {
            transform: scale(1.1);

<script>
    ;(function () {
        'use strict'
        // ---------- DOM ----------
        const scene = document.getElementById('scene')
        const bgCanvas = document.getElementById('bgCanvas')
        const drawCanvas = document.getElementById('drawCanvas')
        const itemsLayer = document.getElementById('itemsLayer')
        const ctx = drawCanvas.getContext('2d')
        const bgCtx = bgCanvas.getContext('2d')
        const cursorDiv = document.getElementById('customCursor')
        const loadingStatus = document.getElementById('loadingStatus')

        const bgSelectorBtn = document.getElementById('bgSelectorBtn')
        const bgDropdown = document.getElementById('bgDropdown')

        // 背景颜色配置
        const bgColors = {
            cream: { type: 'color', value: '#FFF8F0', name: '奶油白' },
            blue: { type: 'color', value: '#E3F2FD', name: '天空蓝' },
            lavender: {
                type: 'color',
                value: '#F3E5F5',
                name: '薰衣草',
            },
            mint: { type: 'color', value: '#E8F5E9', name: '薄荷绿' },
            yellow: { type: 'color', value: '#FFFDE7', name: '阳光黄' },
            grass: {
                type: 'image',
                value: './public/images/草地.webp',
                name: '草地',
            },
            beach: {
                type: 'image',
                value: './public/images/海边.webp',
                name: '海边',
            },
            underwater: {
                type: 'image',
                value: './public/images/海底.webp',
                name: '海底',
            },
            sky: {
                type: 'image',
                value: './public/images/天空.webp',
                name: '天空',
            },
            forest: {
                type: 'image',
                value: './public/images/森林.webp',
                name: '森林',
            },
        }
        let currentBg = 'cream' // 默认奶油白

        // 状态
        let currentSelected = null
        let drawingEnabled = false
        let eraserEnabled = false
        let isDrawing = false
        let isDrawingFromTouch = false
        let brushSize = 6
        let brushColor = '#000000' // 修复Bug: 添加画笔颜色状态变量
        let sceneHistory = [] // 撤销历史记录（保存完整场景）
        const maxHistorySize = 20 // 最多保存20步历史
        const SCALE_MAX = 40.0
        const SCALE_MIN = 0.2

        // 光标 RAF
        let cursorX = 0,
            cursorY = 0
        let rafPending = false
        function updateCursorNow() {
            cursorDiv.style.left = cursorX + 'px'
            cursorDiv.style.top = cursorY + 'px'
            rafPending = false
        }
        function setCursorPos(x, y) {
            cursorX = x
            cursorY = y
            if (!rafPending) {
                rafPending = true
                requestAnimationFrame(updateCursorNow)
            }
        }

        // ========== 初始化 ==========
        window.addEventListener('load', function () {
            preloadBgImages()
            renderItemsPanel()
            setBackground('cream')
            resizeCanvas()
            bindUI()
        })

        // ========== 图片内存缓存系统 ==========
        const imageCache = new Map()
        const imageUrls = [
            './images/21.webp',
            './images/551.webp',
            './images/222222-1.webp',
            './images/2266-1.webp',
            './images/image1.webp',
            './images/image2.webp',
            './images/h.webp',
            './images/1.webp',
            './images/88-1.webp',
            './images/8881.webp',
            './images/image3.webp',
            './images/2-1.webp',
            './images/luntai.webp',
            './images/222-1.webp',
        ]
        let imagesLoadedCount = 0
        const totalImages = imageUrls.length

        function updateLoadingStatus() {
            imagesLoadedCount++
            if (imagesLoadedCount >= totalImages) {
                loadingStatus.textContent = '✨ 素材加载完成！'
                setTimeout(() => {
                    loadingStatus.style.opacity = '0'
                }, 400)
                setTimeout(() => {
                    loadingStatus.style.display = 'none'
                }, 900)
            } else {
                loadingStatus.textContent = `✨ 加载素材中 (${imagesLoadedCount}/${totalImages})`
            }
        }

        function preloadImage(url) {
            return new Promise((resolve) => {
                if (imageCache.has(url)) {
                    resolve(imageCache.get(url))
                    return
                }
                const img = new Image()
                img.crossOrigin = 'anonymous'
                img.onload = () => {
                    const info = {
                        img,
                        loaded: true,
                        width: img.naturalWidth,
                        height: img.naturalHeight,
                    }
                    imageCache.set(url, info)
                    updateLoadingStatus()
                    resolve(info)
                }
                img.onerror = () => {
                    imageCache.set(url, {
                        img,
                        loaded: false,
                        width: 0,
                        height: 0,
                    })
                    updateLoadingStatus()
                    resolve(imageCache.get(url))
                }
                img.src = url
            })
        }

        function preloadImages() {
            imageUrls.forEach((url) => preloadImage(url))
        }
        preloadImages()

        // 绘制背景 - 手绘纸张效果
        const bgImageCache = {}

        function drawBackground() {
            const w = bgCanvas.width
            const h = bgCanvas.height
            if (w <= 0 || h <= 0) return

            const bg = bgColors[currentBg]

            // 图片背景
            if (bg.type === 'image') {
                const cached = bgImageCache[currentBg]
                if (cached) {
                    // 使用缓存的图片绘制并适应画布
                    const img = cached
                    const scale = Math.max(
                        w / img.width,
                        h / img.height
                    )
                    const imgW = img.width * scale
                    const imgH = img.height * scale
                    const x = (w - imgW) / 2
                    const y = (h - imgH) / 2
                    bgCtx.drawImage(img, x, y, imgW, imgH)
                } else {
                    // 图片未加载，使用渐变背景
                    bgCtx.fillStyle = '#87CEEB'
                    bgCtx.fillRect(0, 0, w, h)
                }
                return
            }

            // 颜色背景
            bgCtx.fillStyle = bg.value
            bgCtx.fillRect(0, 0, w, h)

            // 添加纸张纹理（噪点效果）
            const imageData = bgCtx.getImageData(0, 0, w, h)
            const data = imageData.data
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 15
                data[i] = Math.max(0, Math.min(255, data[i] + noise))
                data[i + 1] = Math.max(
                    0,
                    Math.min(255, data[i + 1] + noise)
                )
                data[i + 2] = Math.max(
                    0,
                    Math.min(255, data[i + 2] + noise)
                )
            }
            bgCtx.putImageData(imageData, 0, 0)

            // 添加手绘网格线效果
            bgCtx.strokeStyle = 'rgba(180, 160, 140, 0.15)'
            bgCtx.lineWidth = 0.5

            for (let y = 40; y < h; y += 40) {
                bgCtx.beginPath()
                let x = 0
                bgCtx.moveTo(x, y + (Math.random() - 0.5) * 2)
                while (x < w) {
                    x += 20
                    bgCtx.lineTo(x, y + (Math.random() - 0.5) * 2)
                }
                bgCtx.stroke()
            }

            for (let x = 40; x < w; x += 40) {
                bgCtx.beginPath()
                let y = 0
                bgCtx.moveTo(x + (Math.random() - 0.5) * 2, y)
                while (y < h) {
                    y += 20
                    bgCtx.lineTo(x + (Math.random() - 0.5) * 2, y)
                }
                bgCtx.stroke()
            }

            // 添加淡淡的边缘阴影
            const gradient = bgCtx.createRadialGradient(
                w / 2,
                h / 2,
                0,
                w / 2,
                h / 2,
                Math.max(w, h) * 0.7
            )
            gradient.addColorStop(0, 'rgba(0,0,0,0)')
            gradient.addColorStop(1, 'rgba(0,0,0,0.08)')
            bgCtx.fillStyle = gradient
            bgCtx.fillRect(0, 0, w, h)
        }

        // 预加载背景图片
        function preloadBgImages() {
            for (const [key, bg] of Object.entries(bgColors)) {
                if (bg.type === 'image') {
                    const img = new Image()
                    img.onload = () => {
                        bgImageCache[key] = img
                    }
                    img.src = bg.value
                }
            }
        }

        // 切换背景
        function setBackground(bgKey) {
            if (!bgColors[bgKey]) return
            currentBg = bgKey
            drawBackground()

            // 更新选中状态
            document.querySelectorAll('.bg-option').forEach((opt) => {
                opt.classList.toggle(
                    'selected',
                    opt.dataset.bg === bgKey
                )
            })

            // 关闭下拉菜单
            bgDropdown.classList.remove('show')
        }

        function resizeCanvas() {
            const rect = scene.getBoundingClientRect()
            const W = Math.max(1, Math.round(rect.width))
            const H = Math.max(1, Math.round(rect.height))

            // 修复Bug: 在调整大小时保存 drawCanvas 的内容
            let drawImageData = null
            if (drawCanvas.width > 0 && drawCanvas.height > 0) {
                try {
                    drawImageData = drawCanvas.toDataURL()
                } catch (e) {
                    console.log('保存画布内容失败:', e)
                }
            }

            bgCanvas.width = W
            bgCanvas.height = H
            drawCanvas.width = W
            drawCanvas.height = H

            drawBackground()

            // 修复Bug: 恢复 drawCanvas 的内容
            if (drawImageData) {
                const img = new Image()
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, W, H)
                }
                img.src = drawImageData
            }
        }
        let resizeTimer
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer)
            resizeTimer = setTimeout(() => {
                resizeCanvas()
                clampAllItems()
            }, 100)
        })

        function clampAllItems() {
            document.querySelectorAll('.draggable').forEach((el) => {
                const { tx, ty, scale, rotate } = getTransform(el)
                const pos = clampPosition(el, tx, ty)
                setTransform(el, pos.x, pos.y, scale, rotate)
            })
        }

        // ========== 物品图层整体锁定 ==========
        let itemsLocked = false
        function toggleItemsLock() {
            itemsLocked = !itemsLocked
            const lockBtn = document.getElementById('lockBtn')
            if (itemsLocked) {
                lockBtn.style.background = '#ff6b6b'
                itemsLayer.style.opacity = '0.85'
                clearSelection()
            } else {
                lockBtn.style.background = '#d0d0d0'
                itemsLayer.style.opacity = '1'
            }
        }

        function isLocked(el) {
            return el.dataset.locked === 'true'
        }
        function setLocked(el, locked) {
            el.dataset.locked = locked
            if (locked) el.classList.add('locked-by-mode')
            else el.classList.remove('locked-by-mode')
        }

        function setItemsLockedForMode(lock) {
            document.querySelectorAll('.draggable').forEach((el) => {
                if (!isLocked(el))
                    el.classList.toggle('mode-locked', lock)
            })
        }
        function updateInteractionLock() {
            setItemsLockedForMode(drawingEnabled || eraserEnabled)
        }

        function getTransform(el) {
            if (el._tx === undefined) {
                el._tx = 0
                el._ty = 0
                el._scale = 1.0
                el._rotate = 0
            }
            return {
                tx: el._tx,
                ty: el._ty,
                scale: el._scale,
                rotate: el._rotate,
            }
        }
        // 缓存场景边界，减少DOM访问
        let sceneBounds = null
        let lastBoundsUpdate = 0

        function setTransform(el, tx, ty, scale, rotate) {
            // 只在值变化时更新，减少重绘
            if (
                el._tx !== tx ||
                el._ty !== ty ||
                el._scale !== scale ||
                el._rotate !== rotate
            ) {
                el._tx = tx
                el._ty = ty
                el._scale = scale
                el._rotate = rotate
                el.style.transform = `translate(${Math.round(
                    tx
                )}px, ${Math.round(
                    ty
                )}px) scale(${scale}) rotate(${rotate}deg)`
            }
        }
        function clampPosition(el, tx, ty) {
            const now = Date.now()
            // 每100ms更新一次边界缓存
            if (now - lastBoundsUpdate > 100) {
                const rect = scene.getBoundingClientRect()
                sceneBounds = { width: rect.width, height: rect.height }
                lastBoundsUpdate = now
            }
            const w = el.offsetWidth,
                h = el.offsetHeight
            return {
                x: Math.min(
                    sceneBounds.width - w * 0.3,
                    Math.max(-w * 0.7, tx)
                ),
                y: Math.min(
                    sceneBounds.height - h * 0.3,
                    Math.max(-h * 0.7, ty)
                ),
            }
        }

        /** 儿童贴图显示：取长边为基准放大，避免固定 70×100 过小发糊 */
        const KID_DISPLAY_MAX_EDGE = 240
        function applyKidDisplaySize(div, img) {
            const nw = img.naturalWidth
            const nh = img.naturalHeight
            if (nw <= 0 || nh <= 0) {
                div.style.width = '160px'
                div.style.height = '200px'
                return
            }
            let w, h
            if (nw >= nh) {
                w = KID_DISPLAY_MAX_EDGE
                h = Math.max(
                    1,
                    Math.round((KID_DISPLAY_MAX_EDGE * nh) / nw)
                )
            } else {
                h = KID_DISPLAY_MAX_EDGE
                w = Math.max(
                    1,
                    Math.round((KID_DISPLAY_MAX_EDGE * nw) / nh)
                )
            }
            div.style.width = w + 'px'
            div.style.height = h + 'px'
        }

        // ========== 创建物品 ==========
        function createDraggable(
            type,
            imgUrl,
            saveState = true,
            onCreated = null
        ) {
            const div = document.createElement('div')
            div.className = 'draggable'
            div.setAttribute('data-type', type)

            // 添加加载占位符
            const spinner = document.createElement('div')
            spinner.className = 'img-spinner'
            div.appendChild(spinner)

            const img = document.createElement('img')
            img.crossOrigin = 'anonymous'
            img.src = imgUrl
            img.alt = type
            img.draggable = false
            img.style.opacity = '0'
            img.style.transition = 'opacity 0.3s'
            div.appendChild(img)

            div.style.position = 'absolute'
            itemsLayer.appendChild(div)

            // 优先使用内存缓存中的尺寸信息，无需等待加载
            const cached = imageCache.get(imgUrl)
            if (cached && cached.loaded && type !== 'kid') {
                const targetSize = 300
                const w = cached.width
                const h = cached.height
                // 统一设置为500x500，保持宽高比
                div.style.width = targetSize + 'px'
                div.style.height = targetSize + 'px'
            }

            // 图片加载完成后，根据原始尺寸自适应容器大小（统一500x500）
            function adjustSize() {
                spinner.style.display = 'none'
                img.style.opacity = '1'
                if (type === 'kid') {
                    applyKidDisplaySize(div, img)
                    requestAnimationFrame(() => {
                        const rect = scene.getBoundingClientRect()
                        const centerX =
                            (rect.width - div.offsetWidth) / 2
                        const centerY =
                            (rect.height - div.offsetHeight) / 2
                        const pos = clampPosition(div, centerX, centerY)
                        setTransform(div, pos.x, pos.y, 1.0, 0)
                    })
                    return
                }
                const nw = img.naturalWidth
                const nh = img.naturalHeight
                if (nw > 0 && nh > 0) {
                    const targetSize = 300
                    div.style.width = targetSize + 'px'
                    div.style.height = targetSize + 'px'
                }
                requestAnimationFrame(() => {
                    const rect = scene.getBoundingClientRect()
                    const centerX = (rect.width - div.offsetWidth) / 2
                    const centerY = (rect.height - div.offsetHeight) / 2
                    const pos = clampPosition(div, centerX, centerY)
                    setTransform(div, pos.x, pos.y, 1.0, 0)
                })
            }
            if (img.complete && img.naturalWidth > 0) {
                adjustSize()
            } else {
                img.onload = adjustSize
                img.onerror = adjustSize
            }

            const rect = scene.getBoundingClientRect()
            const centerX = (rect.width - div.offsetWidth) / 2
            const centerY = (rect.height - div.offsetHeight) / 2
            const pos = clampPosition(div, centerX, centerY)
            setTransform(div, pos.x, pos.y, 1.0, 0)

            // 如果是新增物品（需要保存状态），保存场景
            if (saveState) {
                saveSceneState()
            }

            // 调用创建完成回调
            if (onCreated) {
                onCreated(div)
            }

            return div
        }

        // ========== 移动端物品拖拽系统（事件委托） ==========
        let activeDrag = null
        let dragStartX = 0,
            dragStartY = 0
        let dragStartTx = 0,
            dragStartTy = 0
        let dragStartScale = 1,
            dragStartRotate = 0
        let activePinch = null
        let pinchStartDistance = 0,
            pinchStartScale = 1
        let pinchStartAngle = 0,
            pinchStartRotate = 0
        let pinchStartTx = 0,
            pinchStartTy = 0
        let pinchCenterX = 0,
            pinchCenterY = 0

        function getItemAtPoint(x, y) {
            const elements = document.elementsFromPoint(x, y)
            for (const el of elements) {
                if (
                    el.classList &&
                    el.classList.contains('draggable')
                ) {
                    return el
                }
            }
            return null
        }

        function getDistance(t1, t2) {
            return Math.hypot(
                t2.clientX - t1.clientX,
                t2.clientY - t1.clientY
            )
        }

        function getAngle(t1, t2) {
            return (
                (Math.atan2(
                    t2.clientY - t1.clientY,
                    t2.clientX - t1.clientX
                ) *
                    180) /
                Math.PI
            )
        }

        function getTouchCenter(touches) {
            let x = 0,
                y = 0
            for (let i = 0; i < touches.length; i++) {
                x += touches[i].clientX
                y += touches[i].clientY
            }
            return { x: x / touches.length, y: y / touches.length }
        }

        // 触摸开始
        function onTouchStart(e) {
            const touches = e.touches

            // 物品图层锁定时，禁止拖拽
            if (itemsLocked) return

            // 绘画模式下不处理物品拖拽，让 drawCanvas 处理绘画
            if (drawingEnabled || eraserEnabled) return

            if (touches.length === 1) {
                // 单指触摸
                const el = getItemAtPoint(
                    touches[0].clientX,
                    touches[0].clientY
                )
                if (el) {
                    if (isLocked(el)) {
                        selectElement(el)
                        return
                    }
                    activeDrag = el
                    const { tx, ty, scale, rotate } = getTransform(el)
                    dragStartX = touches[0].clientX
                    dragStartY = touches[0].clientY
                    dragStartTx = tx
                    dragStartTy = ty
                    dragStartScale = scale
                    dragStartRotate = rotate
                    selectElement(el)
                    e.preventDefault()
                }
            } else if (touches.length === 2) {
                // 双指触摸 - 缩放和旋转
                let el = activeDrag
                if (!el) {
                    // 检查两个手指的位置，找到物品
                    el =
                        getItemAtPoint(
                            touches[0].clientX,
                            touches[0].clientY
                        ) ||
                        getItemAtPoint(
                            touches[1].clientX,
                            touches[1].clientY
                        )
                }
                if (el && !isLocked(el)) {
                    activePinch = el
                    const center = getTouchCenter([
                        touches[0],
                        touches[1],
                    ])
                    pinchCenterX = center.x
                    pinchCenterY = center.y
                    pinchStartDistance = getDistance(
                        touches[0],
                        touches[1]
                    )
                    pinchStartAngle = getAngle(touches[0], touches[1])
                    const { tx, ty, scale, rotate } = getTransform(el)
                    pinchStartScale = scale
                    pinchStartRotate = rotate
                    pinchStartTx = tx
                    pinchStartTy = ty
                    selectElement(el)
                    e.preventDefault()
                }
            }
        }

        // 触摸移动
        function onTouchMove(e) {
            const touches = e.touches

            // 物品图层锁定时，禁止移动
            if (itemsLocked) return

            if (activePinch && touches.length >= 2) {
                // 双指缩放旋转
                if (isLocked(activePinch)) return

                const center = getTouchCenter([touches[0], touches[1]])
                const curDistance = getDistance(touches[0], touches[1])
                const curAngle = getAngle(touches[0], touches[1])

                const scaleFactor = curDistance / pinchStartDistance
                let newScale = pinchStartScale * scaleFactor
                newScale = Math.min(
                    SCALE_MAX,
                    Math.max(SCALE_MIN, newScale)
                )

                const angleDiff = curAngle - pinchStartAngle
                let newRotate = pinchStartRotate + angleDiff

                // 移动位置
                const dx = center.x - pinchCenterX
                const dy = center.y - pinchCenterY
                let newTx = pinchStartTx + dx
                let newTy = pinchStartTy + dy

                const pos = clampPosition(activePinch, newTx, newTy)
                setTransform(
                    activePinch,
                    pos.x,
                    pos.y,
                    newScale,
                    newRotate
                )

                e.preventDefault()
            } else if (activeDrag && touches.length === 1) {
                // 单指拖拽
                if (isLocked(activeDrag)) return

                const dx = touches[0].clientX - dragStartX
                const dy = touches[0].clientY - dragStartY
                let newTx = dragStartTx + dx
                let newTy = dragStartTy + dy
                const pos = clampPosition(activeDrag, newTx, newTy)
                setTransform(
                    activeDrag,
                    pos.x,
                    pos.y,
                    dragStartScale,
                    dragStartRotate
                )
                e.preventDefault()
            }
        }

        // 触摸结束
        function onTouchEnd(e) {
            // 触摸结束时保存场景状态（如果有过操作）
            if (activeDrag || activePinch) {
                saveSceneState()
            }
            if (e.touches.length === 0) {
                activeDrag = null
                activePinch = null
            } else if (e.touches.length === 1) {
                activePinch = null
            }
        }

        // 绑定触摸事件到 scene
        scene.addEventListener('touchstart', onTouchStart, {
            passive: false,
        })
        scene.addEventListener('touchmove', onTouchMove, {
            passive: false,
        })
        scene.addEventListener('touchend', onTouchEnd)
        scene.addEventListener('touchcancel', onTouchEnd)

        // ========== 桌面端鼠标拖拽 ==========
        let mouseDragTarget = null
        let mouseStartX = 0,
            mouseStartY = 0
        let mouseStartTx = 0,
            mouseStartTy = 0
        let mouseStartScale = 1,
            mouseStartRotate = 0

        scene.addEventListener('mousedown', function (e) {
            if (itemsLocked) return

            const el = getItemAtPoint(e.clientX, e.clientY)
            // 只有点击物品时才取消绘画模式，点击空白处保持绘画
            if (el) {
                if (drawingEnabled || eraserEnabled) {
                    disableAllModes()
                    selectElement(el)
                    return
                }
                if (isLocked(el)) {
                    selectElement(el)
                    return
                }
                mouseDragTarget = el
                const { tx, ty, scale, rotate } = getTransform(el)
                mouseStartX = e.clientX
                mouseStartY = e.clientY
                mouseStartTx = tx
                mouseStartTy = ty
                mouseStartScale = scale
                mouseStartRotate = rotate
                selectElement(el)
            }
        })

        document.addEventListener('mousemove', function (e) {
            if (itemsLocked) return
            if (mouseDragTarget) {
                if (isLocked(mouseDragTarget)) return
                const dx = e.clientX - mouseStartX
                const dy = e.clientY - mouseStartY
                let newTx = mouseStartTx + dx
                let newTy = mouseStartTy + dy
                const pos = clampPosition(mouseDragTarget, newTx, newTy)
                setTransform(
                    mouseDragTarget,
                    pos.x,
                    pos.y,
                    mouseStartScale,
                    mouseStartRotate
                )
            }
        })

        document.addEventListener('mouseup', function () {
            if (mouseDragTarget) {
                // 拖拽结束时保存场景状态
                saveSceneState()
            }
            mouseDragTarget = null
        })

        // 滚轮缩放
        function onWheel(e) {
            if (!currentSelected) return
            if (drawingEnabled || eraserEnabled) return
            if (isLocked(currentSelected)) return

            e.preventDefault()
            const delta = e.deltaY > 0 ? 0.9 : 1.1
            const { tx, ty, scale, rotate } =
                getTransform(currentSelected)
            let newScale = scale * delta
            newScale = Math.min(
                SCALE_MAX,
                Math.max(SCALE_MIN, newScale)
            )
            setTransform(currentSelected, tx, ty, newScale, rotate)
        }

        scene.addEventListener('wheel', onWheel, { passive: false })

        function selectElement(el) {
            // 点击画布上的物品时自动取消画笔/橡皮擦模式
            if (drawingEnabled || eraserEnabled) {
                disableAllModes()
            }
            if (currentSelected)
                currentSelected.classList.remove('selected')
            currentSelected = el
            el.classList.add('selected')
        }
        // 点击物品栏时不取消画笔模式，只选中物品
        function selectElementNoDisable(el) {
            if (currentSelected)
                currentSelected.classList.remove('selected')
            currentSelected = el
            el.classList.add('selected')
        }
        function clearSelection() {
            if (currentSelected)
                currentSelected.classList.remove('selected')
            currentSelected = null
        }
        function deleteSelected() {
            if (!currentSelected) return
            saveSceneState()
            if (confirm('确定删除选中的物品吗？')) {
                currentSelected.remove()
                clearSelection()
            }
        }
        function clearScene() {
            if (confirm('确定清空所有物品和绘画吗？')) {
                itemsLayer.innerHTML = ''
                clearCanvas()
                clearSelection()
            }
        }
        function clearCanvas() {
            ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height)
        }

        function disableAllModes() {
            clearSelection() // 取消物品选择
            drawingEnabled = eraserEnabled = false
            drawCanvas.classList.remove('drawing-mode')
            document
                .getElementById('brushBtn')
                .classList.remove('active')
            document
                .getElementById('eraserBtn')
                .classList.remove('active')
            updateInteractionLock()
            updateCursor()
        }

        function closeAllDropdowns() {
            const brushDropdown = document.querySelector(
                '.brush-dropdown-content'
            )
            const bgDropdownContent = document.querySelector(
                '.bg-dropdown-content'
            )
            if (brushDropdown) brushDropdown.classList.remove('show')
            if (bgDropdownContent)
                bgDropdownContent.classList.remove('show')
        }
        function toggleDrawing() {
            if (drawingEnabled) {
                disableAllModes()
                return
            }
            disableAllModes()
            drawingEnabled = true
            drawCanvas.classList.add('drawing-mode')
            document.getElementById('brushBtn').classList.add('active')
            updateInteractionLock()
            updateCursor()
            closeAllDropdowns()
        }
        function toggleEraser() {
            if (eraserEnabled) {
                disableAllModes()
                return
            }
            disableAllModes()
            eraserEnabled = true
            drawCanvas.classList.add('drawing-mode')
            document.getElementById('eraserBtn').classList.add('active')
            document
                .getElementById('brushBtn')
                .classList.remove('active')
            updateInteractionLock()
            updateCursor()
        }
        function updateCursor() {
            if (drawingEnabled || eraserEnabled) {
                cursorDiv.style.display = 'block'
                if (eraserEnabled) {
                    cursorDiv.classList.add('eraser-mode')
                } else {
                    cursorDiv.classList.remove('eraser-mode')
                }
            } else {
                cursorDiv.style.display = 'none'
            }
        }
        function moveCursor(e) {
            if (!drawingEnabled && !eraserEnabled) return
            let cx, cy
            if (e.touches) {
                cx = e.touches[0].clientX
                cy = e.touches[0].clientY
            } else {
                cx = e.clientX
                cy = e.clientY
            }
            setCursorPos(cx, cy)
        }
        function getCanvasCoords(e) {
            const rect = drawCanvas.getBoundingClientRect()
            const cx = e.touches ? e.touches[0].clientX : e.clientX
            const cy = e.touches ? e.touches[0].clientY : e.clientY
            return { x: cx - rect.left, y: cy - rect.top }
        }
        // 记录上一个点用于曲线平滑
        let lastX, lastY

        function startDrawing(e) {
            if (!drawingEnabled && !eraserEnabled) return
            e.preventDefault()
            const isTouch = e.touches !== undefined
            if (isTouch && isDrawingFromTouch) return
            if (!isTouch && isDrawing) return
            closeAllDropdowns()
            saveSceneState()
            const { x, y } = getCanvasCoords(e)
            isDrawing = true
            if (isTouch) isDrawingFromTouch = true
            lastX = x
            lastY = y
            ctx.beginPath()
            ctx.moveTo(x, y)
            ctx.lineWidth = brushSize
            ctx.strokeStyle = brushColor
            ctx.lineCap = 'round'
            ctx.lineJoin = 'round'
            ctx.globalCompositeOperation = eraserEnabled
                ? 'destination-out'
                : 'source-over'
        }
        // 使用二次贝塞尔曲线平滑线条
        function draw(e) {
            if (!isDrawing) return
            e.preventDefault()
            const { x, y } = getCanvasCoords(e)
            const midX = (lastX + x) / 2
            const midY = (lastY + y) / 2
            ctx.quadraticCurveTo(lastX, lastY, midX, midY)
            ctx.stroke()
            ctx.beginPath()
            ctx.moveTo(midX, midY)
            lastX = x
            lastY = y
        }
        function stopDrawing() {
            if (!isDrawing && !isDrawingFromTouch) return
            isDrawing = false
            isDrawingFromTouch = false
            ctx.globalCompositeOperation = 'source-over'
        }
        function setBrushSize(size) {
            brushSize = size
            document
                .querySelectorAll('.size-btn')
                .forEach((btn) =>
                    btn.classList.toggle(
                        'active',
                        parseInt(btn.dataset.size) === size
                    )
                )
        }
        function setBrushColor(color) {
            brushColor = color
        }
        // 保存完整场景状态（物品 + 画布）用于撤销
        function saveSceneState() {
            // 保存所有物品的信息
            const items = []
            document.querySelectorAll('.draggable').forEach((el) => {
                const img = el.querySelector('img')
                if (img && img.src) {
                    const { tx, ty, scale, rotate } = getTransform(el)
                    items.push({
                        type: el.dataset.type,
                        imgUrl: img.src,
                        tx: tx,
                        ty: ty,
                        scale: scale,
                        rotate: rotate,
                        zIndex: el.style.zIndex || '5',
                    })
                }
            })
            // 保存画布状态
            const canvasState = drawCanvas.toDataURL('image/png')
            sceneHistory.push({ items: items, canvas: canvasState })
            if (sceneHistory.length > maxHistorySize) {
                sceneHistory.shift()
            }
        }
        // 撤销上一步
        function undoScene() {
            if (sceneHistory.length === 0) return

            const currentState = sceneHistory.pop()

            // 清空物品层
            itemsLayer.innerHTML = ''
            clearCanvas()

            // 恢复画布
            if (currentState && currentState.canvas) {
                const canvasImg = new Image()
                canvasImg.onload = function () {
                    ctx.drawImage(
                        canvasImg,
                        0,
                        0,
                        drawCanvas.width,
                        drawCanvas.height
                    )
                }
                canvasImg.src = currentState.canvas
            }

            // 恢复物品
            if (
                currentState &&
                currentState.items &&
                currentState.items.length > 0
            ) {
                currentState.items.forEach((item) => {
                    const div = document.createElement('div')
                    div.className = 'draggable'
                    div.setAttribute('data-type', item.type)

                    const spinner = document.createElement('div')
                    spinner.className = 'img-spinner'
                    div.appendChild(spinner)

                    const img = document.createElement('img')
                    img.crossOrigin = 'anonymous'
                    img.src = item.imgUrl
                    img.alt = item.type
                    img.draggable = false
                    img.style.opacity = '0'
                    img.style.transition = 'opacity 0.3s'
                    div.appendChild(img)

                    div.style.position = 'absolute'
                    itemsLayer.appendChild(div)

                    // 图片加载完成后设置样式和位置
                    img.onload = function () {
                        spinner.style.display = 'none'
                        img.style.opacity = '1'

                        if (item.type === 'kid') {
                            applyKidDisplaySize(div, img)
                        } else {
                            const targetSize = 300
                            div.style.width = targetSize + 'px'
                            div.style.height = targetSize + 'px'
                        }

                        // 设置位置和变换
                        setTransform(
                            div,
                            item.tx,
                            item.ty,
                            item.scale,
                            item.rotate
                        )
                        div.style.zIndex = item.zIndex
                    }
                    img.onerror = function () {
                        // 图片加载失败时也尝试恢复位置
                        spinner.style.display = 'none'
                        img.style.opacity = '1'
                        if (item.type === 'kid') {
                            div.style.width = '160px'
                            div.style.height = '200px'
                        } else {
                            const targetSize = 300
                            div.style.width = targetSize + 'px'
                            div.style.height = targetSize + 'px'
                        }
                        setTransform(
                            div,
                            item.tx,
                            item.ty,
                            item.scale,
                            item.rotate
                        )
                        div.style.zIndex = item.zIndex
                    }
                })
            }
        }
        /** 与 saveImage / 预览共用：把物品画进与 bgCanvas 同尺寸的位图坐标系 */
        function drawDraggablesToCanvas(ctx) {
            itemsLayer.querySelectorAll('.draggable').forEach((el) => {
                const img = el.querySelector('img')
                if (!img || !img.complete || img.naturalWidth === 0)
                    return
                const nw = img.naturalWidth
                const nh = img.naturalHeight
                const W = el.offsetWidth
                const H = el.offsetHeight
                if (W < 1 || H < 1) return
                // 与 CSS object-fit: contain 一致，避免把整张图硬拉到 W×H 导致与屏幕尺寸/比例不符
                const fit = Math.min(W / nw, H / nh)
                const dw = nw * fit
                const dh = nh * fit
                const { tx, ty, scale, rotate } = getTransform(el)
                const centerX = tx + W / 2
                const centerY = ty + H / 2
                ctx.save()
                ctx.translate(centerX, centerY)
                // 与 style.transform = translate scale rotate 的矩阵顺序一致：T * S * R
                ctx.scale(scale, scale)
                ctx.rotate((rotate * Math.PI) / 180)
                ctx.drawImage(
                    img,
                    0,
                    0,
                    nw,
                    nh,
                    -dw / 2,
                    -dh / 2,
                    dw,
                    dh
                )
                ctx.restore()
            })
        }

        /** 将场景（背景 + 物品 + 涂鸦）合成到已有尺寸的 2d 上下文 */
        function compositeSceneToContext(ctx) {
            const W = bgCanvas.width
            const H = bgCanvas.height
            if (W < 1 || H < 1) return
            const c = ctx.canvas
            if (c.width !== W || c.height !== H) {
                c.width = W
                c.height = H
            }
            ctx.drawImage(bgCanvas, 0, 0)
            drawDraggablesToCanvas(ctx)
            ctx.drawImage(drawCanvas, 0, 0)
        }

        function saveImage() {
            const W = bgCanvas.width
            const H = bgCanvas.height
            if (W < 1 || H < 1) return
            const offCanvas = document.createElement('canvas')
            offCanvas.width = W
            offCanvas.height = H
            compositeSceneToContext(offCanvas.getContext('2d'))
            const link = document.createElement('a')
            link.download = '小人国大世界.png'
            link.href = offCanvas.toDataURL('image/png')
            link.click()
        }

        // ---------- 画布区域视频录制（画面 + 麦克风）----------
        let recordCanvas = null
        let recordCtx = null
        let recordRafId = null
        let recordActive = false
        let mediaRecorder = null
        let recordChunks = []
        let recordMicStream = null
        let recordVideoStream = null

        function ensureRecordCanvas() {
            if (!recordCanvas) {
                recordCanvas = document.createElement('canvas')
                recordCtx = recordCanvas.getContext('2d')
                recordCanvas.setAttribute('aria-hidden', 'true')
                Object.assign(recordCanvas.style, {
                    position: 'fixed',
                    left: '0',
                    top: '0',
                    width: '1px',
                    height: '1px',
                    opacity: '0',
                    pointerEvents: 'none',
                    zIndex: '-1',
                })
                document.body.appendChild(recordCanvas)
            }
        }

        /** 优先 MP4（Chrome 126+ 等），否则 WebM */
        function createBestMediaRecorder(stream) {
            const candidates = [
                'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
                'video/mp4;codecs=avc1,mp4a.40.2',
                'video/mp4;codecs=h264,aac',
                'video/mp4',
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm',
            ]
            for (let i = 0; i < candidates.length; i++) {
                const mime = candidates[i]
                if (!MediaRecorder.isTypeSupported(mime)) continue
                try {
                    return new MediaRecorder(stream, { mimeType: mime })
                } catch (e) {
                    /* 部分浏览器 isTypeSupported 为真仍无法实例化，试下一项 */
                }
            }
            return new MediaRecorder(stream)
        }

        function extensionFromRecorderMime(mime) {
            if (!mime || typeof mime !== 'string') return 'webm'
            const m = mime.toLowerCase()
            if (m.indexOf('mp4') !== -1) return 'mp4'
            if (m.indexOf('webm') !== -1) return 'webm'
            return 'webm'
        }

        function recordFrameLoop() {
            if (!recordActive || !recordCtx) return
            compositeSceneToContext(recordCtx)
            recordRafId = requestAnimationFrame(recordFrameLoop)
        }

        function stopTracks(stream) {
            if (!stream) return
            stream.getTracks().forEach(function (t) {
                t.stop()
            })
        }

        function finishSceneRecordingDownload() {
            const mimeType = mediaRecorder
                ? mediaRecorder.mimeType || 'video/mp4'
                : 'video/mp4'
            const ext = extensionFromRecorderMime(mimeType)
            const blob = new Blob(recordChunks, { type: mimeType })
            recordChunks = []
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download =
                '小人国录制_' +
                new Date()
                    .toISOString()
                    .slice(0, 19)
                    .replace(/[:-]/g, '') +
                '.' +
                ext
            a.click()
            setTimeout(function () {
                URL.revokeObjectURL(url)
            }, 2000)
        }

        function stopSceneRecording() {
            recordActive = false
            if (recordRafId != null) {
                cancelAnimationFrame(recordRafId)
                recordRafId = null
            }
            const btn = document.getElementById('recordBtnHeader')
            if (btn) {
                btn.classList.remove('recording')
                btn.title = '视频录制'
                const icon = btn.querySelector('i')
                if (icon) {
                    icon.className = 'fas fa-video'
                }
            }
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try {
                    if (typeof mediaRecorder.requestData === 'function')
                        mediaRecorder.requestData()
                    mediaRecorder.stop()
                } catch (e) {
                    console.warn(e)
                    stopTracks(recordMicStream)
                    stopTracks(recordVideoStream)
                    recordMicStream = recordVideoStream = null
                    mediaRecorder = null
                }
            } else {
                stopTracks(recordMicStream)
                stopTracks(recordVideoStream)
                recordMicStream = recordVideoStream = null
                mediaRecorder = null
            }
        }

        async function startSceneRecording() {
            if (!window.MediaRecorder) {
                alert('当前浏览器不支持视频录制（MediaRecorder）。')
                return
            }
            const W = bgCanvas.width
            const H = bgCanvas.height
            if (W < 1 || H < 1) return

            let micStream = null
            try {
                micStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: false,
                })
            } catch (e) {
                alert(
                    '无法使用麦克风，请允许权限后重试。错误：' +
                        (e && e.message ? e.message : String(e))
                )
                return
            }

            ensureRecordCanvas()
            recordCanvas.width = W
            recordCanvas.height = H
            compositeSceneToContext(recordCtx)

            let videoStream = null
            try {
                videoStream = recordCanvas.captureStream(30)
            } catch (e) {
                stopTracks(micStream)
                alert(
                    '无法从画布捕获视频流。错误：' +
                        (e && e.message ? e.message : String(e))
                )
                return
            }

            const out = new MediaStream()
            videoStream.getVideoTracks().forEach(function (t) {
                out.addTrack(t)
            })
            micStream.getAudioTracks().forEach(function (t) {
                out.addTrack(t)
            })

            let recorder = null
            try {
                recorder = createBestMediaRecorder(out)
            } catch (e) {
                stopTracks(micStream)
                stopTracks(videoStream)
                alert(
                    '无法创建录制器。错误：' +
                        (e && e.message ? e.message : String(e))
                )
                return
            }

            recordChunks = []
            recordMicStream = micStream
            recordVideoStream = videoStream
            mediaRecorder = recorder

            mediaRecorder.ondataavailable = function (e) {
                if (e.data && e.data.size > 0) recordChunks.push(e.data)
            }
            mediaRecorder.onstop = function () {
                finishSceneRecordingDownload()
                stopTracks(recordMicStream)
                stopTracks(recordVideoStream)
                recordMicStream = recordVideoStream = null
                mediaRecorder = null
            }

            try {
                mediaRecorder.start(250)
            } catch (e) {
                stopTracks(micStream)
                stopTracks(videoStream)
                mediaRecorder = null
                alert(
                    '开始录制失败：' +
                        (e && e.message ? e.message : String(e))
                )
                return
            }

            recordActive = true
            const btn = document.getElementById('recordBtnHeader')
            if (btn) {
                btn.classList.add('recording')
                btn.title = '结束录制并下载'
                const icon = btn.querySelector('i')
                if (icon) icon.className = 'fas fa-stop'
            }
            recordFrameLoop()
        }

        function toggleSceneRecording() {
            if (recordActive) {
                stopSceneRecording()
            } else {
                startSceneRecording()
            }
        }

                    btn.title = itemData.name
                    btn.innerHTML = `<img src="${itemData.variants[0].img}" alt="${itemData.name}">`

                    itemsDiv.appendChild(btn)

                categoryDiv.appendChild(itemsDiv)
                container.appendChild(categoryDiv)
